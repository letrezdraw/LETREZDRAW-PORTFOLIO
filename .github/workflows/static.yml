# Deploy the built site to GitHub Pages (free for public repos).
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Vite base path for GitHub Pages
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "Site root: user/org pages → base /"
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "Project pages → base /$NAME/"
            echo "VITE_BASE=/$NAME/" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
